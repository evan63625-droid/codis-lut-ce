<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CODIS SIMU - SDIS LUTECE BSPP</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
}

header{
background:#b30000;
padding:12px;
text-align:center;
font-weight:bold;
}

.container{
padding:10px;
max-width:1100px;
margin:auto;
display:none;
}

.box{
background:#2b2b2b;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

button{
padding:6px;
margin-top:5px;
cursor:pointer;
width:100%;
}

.vehicle{
background:#3a3a3a;
padding:5px;
margin:5px 0;
border-radius:6px;
font-size:13px;
cursor:pointer;
}

input,textarea,select{
width:100%;
margin:5px 0;
padding:6px;
}

#login{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

#popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
}
</style>
</head>

<body>

<div id="login">
<h2>🚒 ACCÈS SDIS LUTECE BSPP</h2>

<input id="matricule" placeholder="Matricule">

<div id="statusLogin"></div>

<select id="role">
<option value="OPERATEUR">Opérateur</option>
<option value="STATIONNAIRE">Stationnaire</option>
<option value="CHEF">Chef de salle</option>
</select>

<button onclick="enter()">Connexion</button>
</div>

<header>🚒 SDIS LUTECE BSPP</header>

<div class="container">

<div class="box">
<h3>📡 Intervention</h3>

<input list="types" id="type" placeholder="Type intervention">

<datalist id="types">
<option value="SAP - Secours à personne">
<option value="AVP - Accident de circulation">
<option value="INC - Feu habitation">
<option value="DIV - Fuite gaz">
<option value="NRBC - Risque chimique">
</datalist>

<input id="adresse" placeholder="Adresse">
<textarea id="obs" placeholder="Observations"></textarea>

<input id="vehiculesInter" placeholder="Véhicules engagés">
<input id="webhook" placeholder="Webhook Discord">

<button onclick="create()">Créer + envoyer</button>
</div>

<div class="box">
<h3>📋 Feuille intervention</h3>
<div id="sheet">Aucune sélection</div>
<button onclick="copy()">📋 Copier</button>
<button onclick="pdf()">📥 PDF</button>
</div>

<div class="box">
<h3>🚒 Véhicules</h3>
<div id="veh"></div>
</div>

<div class="box">
<h3>📚 Historique interventions</h3>
<div id="history"></div>
</div>

<div class="box" id="logBox">
<h3>👥 Historique connexions</h3>
<div id="logs"></div>
<button onclick="clearLogs()">🗑 Supprimer logs</button>
</div>

</div>

<div id="popup">
<div class="box">
<h3>Changer statut</h3>
<div id="statusBtns"></div>
</div>
</div>

<script>

/* 🔐 USERS */
const usersMap={
"SP-95":["OPERATEUR","CHEF","STATIONNAIRE"],
"SP-09":["OPERATEUR","CHEF","STATIONNAIRE"],
"BSPPlutèce":["ADMIN"]
};

let user=null;
let last=null;
let selectedVeh=null;

/* 📊 LOGS */
let logs=JSON.parse(localStorage.getItem("logs")||"[]");

let statuses=[
{label:"Départ",val:1},
{label:"Sur les lieux",val:2},
{label:"Message",val:3},
{label:"Urgent",val:4},
{label:"Transit hôpital",val:5},
{label:"Arrivé hôpital",val:6},
{label:"Disponible",val:7},
{label:"Indispo",val:8},
{label:"Rentré",val:9}
];

let vehicules=[
{name:"VSAV-01",status:7},
{name:"VSAV-02",status:7},
{name:"FPT-01",status:7},
{name:"FPT-02",status:7},
{name:"CCF-01",status:7},
{name:"EPA-01",status:7},
{name:"FSR-01",status:7},
{name:"VGRIMP-01",status:7},
{name:"VPL-01",status:7},
{name:"CCGC-01",status:7},
{name:"VL-01",status:7},
{name:"VLGC-01",status:7},
{name:"SSM-01",status:7}
];

/* 🚒 LOGIN */
function enter(){
let mat=document.getElementById("matricule").value;
let role=document.getElementById("role").value;

if(!usersMap[mat] || !usersMap[mat].includes(role)){
alert("❌ refusé");
return;
}

user={name:mat,role:role};

/* LOG CONNEXION */
logs.push({
matricule:mat,
role:role,
time:new Date().toLocaleString()
});

localStorage.setItem("logs",JSON.stringify(logs));

document.getElementById("login").style.display="none";
document.querySelector(".container").style.display="block";

renderVeh();
renderHistory();
renderLogs();
}

/* 🚒 VEHICULES */
function renderVeh(){
let box=document.getElementById("veh");
box.innerHTML="";

vehicules.forEach((v,i)=>{
let div=document.createElement("div");
div.className="vehicle";
div.innerHTML=v.name+" - "+v.status;

div.onclick=function(){
selectedVeh=i;
openPopup();
};

box.appendChild(div);
});
}

/* 🚒 POPUP */
function openPopup(){
if(selectedVeh===null) return;

let popup=document.getElementById("popup");
let btns=document.getElementById("statusBtns");

btns.innerHTML="";

statuses.forEach(s=>{
let b=document.createElement("button");
b.innerHTML=s.label;

b.onclick=function(){
vehicules[selectedVeh].status=s.val;
popup.style.display="none";
renderVeh();
};

btns.appendChild(b);
});

popup.style.display="flex";
}

/* 🚒 LOGS */
function renderLogs(){
let box=document.getElementById("logs");
if(!box)return;

box.innerHTML=logs.slice(-10).reverse()
.map(l=>`${l.matricule} - ${l.role} - ${l.time}`)
.join("<br>");
}

/* 🚒 DELETE LOGS ADMIN ONLY */
function clearLogs(){
if(!user || user.name!=="BSPPlutèce"){
alert("❌ accès refusé");
return;
}

if(confirm("Supprimer logs ?")){
logs=[];
localStorage.setItem("logs",JSON.stringify(logs));
renderLogs();
}
}

/* INIT */
window.onload=function(){
document.getElementById("login").style.display="flex";
document.querySelector(".container").style.display="none";
};

</script>

</body>
</html>
